name: Build PiP Controller Pro

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download AutoHotkey v1.1 compiler
      run: |
        $url = "https://www.autohotkey.com/download/ahk-install.exe"
        $output = "ahk-install.exe"
        Invoke-WebRequest -Uri $url -OutFile $output
        Start-Process -FilePath $output -ArgumentList "/S", "/D=C:\Program Files\AutoHotkey" -Wait
    
    - name: Verify Compiler
      run: |
        if (Test-Path "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe") {
          Write-Host "Compiler found!"
        } else {
          Write-Host "Compiler NOT found!"
          exit 1
        }

    - name: Build Application
      run: .\build.ps1 -BuildAll
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: pip-controller-dist
        path: dist/
