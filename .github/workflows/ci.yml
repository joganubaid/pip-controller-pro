name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # AutoHotkey 1.1 (legacy branch) is unmaintained; pinning to the last
      # released v1.1 version. We use the portable ZIP — NOT the installer:
      # the v1.1 setup.exe is a 7-Zip Self-extracting archive that requires
      # UAC elevation even with silent flags, and silent install fails on
      # GitHub-hosted runners. The portable ZIP ships the runtime,
      # Compiler/Ahk2Exe.exe, and the base .bin files — everything we need.
      # Extracting to .ahk/ also lets build.ps1's local-fallback find it.
      #
      # Source URL: GitHub Releases, NOT autohotkey.com. The autohotkey.com
      # domain is fronted by Cloudflare with bot-challenge enabled, which
      # blocks GitHub Actions runner IPs (Invoke-WebRequest receives the
      # "Just a moment..." JS challenge HTML instead of the ZIP). The
      # AutoHotkey project mirrors the same release on GitHub Releases —
      # bit-identical artifact, no Cloudflare in front. Keep this URL.
      - name: Install AutoHotkey 1.1.37.02 (portable)
        shell: pwsh
        run: |
          $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          $zip = Join-Path $env:RUNNER_TEMP "ahk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath ".ahk" -Force
          if (-not (Test-Path ".ahk\Compiler\Ahk2Exe.exe")) {
            throw "Ahk2Exe missing at .ahk\Compiler\Ahk2Exe.exe after extract"
          }
          Write-Host "Ahk2Exe ready"

      - name: Syntax check (compile AHK script)
        shell: pwsh
        run: |
          $compiler = ".ahk\Compiler\Ahk2Exe.exe"
          $base     = ".ahk\Compiler\Unicode 64-bit.bin"
          $tmpExe   = Join-Path $env:RUNNER_TEMP "syntax-check.exe"
          & $compiler /in pip-controller.ahk /out $tmpExe /base $base
          if ($LASTEXITCODE -ne 0) {
            throw "Ahk2Exe exited $LASTEXITCODE"
          }
          if (-not (Test-Path $tmpExe)) {
            throw "Ahk2Exe produced no output"
          }
          Write-Host "OK: built $tmpExe ($((Get-Item $tmpExe).Length) bytes)"

      - name: PSScriptAnalyzer on build.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path build.ps1 -Severity Information,Warning,Error
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer: $($errors.Count) error(s)"
          }
          Write-Host "PSScriptAnalyzer: clean (errors)"

      - name: Version consistency
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $match = Select-String -Path pip-controller.ahk -Pattern '^AppVersion := "([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            throw "Could not locate AppVersion line in pip-controller.ahk"
          }
          $inSource = $match.Matches[0].Groups[1].Value
          if ($version -ne $inSource) {
            throw "VERSION ($version) does not match AppVersion in pip-controller.ahk ($inSource)"
          }
          Write-Host "Version check OK: $version"

      # CI builds the portable zip only — installing Inno Setup would add ~30s
      # to every PR for no extra coverage. The full -BuildAll is exercised by
      # the release workflow on tag push.
      - name: Build (smoke, portable only)
        shell: pwsh
        run: |
          ./build.ps1 -BuildPortable
          Get-ChildItem dist | Format-Table -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pip-controller-build
          path: |
            pip-controller.exe
            dist/*.zip
          if-no-files-found: warn
          retention-days: 14
