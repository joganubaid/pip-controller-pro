name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      # Actions are SHA-pinned for supply-chain hardening; comment lists the
      # human-readable tag so Dependabot can keep the pin current.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # AutoHotkey 1.1 (legacy branch) is unmaintained; pinning to the last
      # released v1.1 version. We use the portable ZIP — NOT the installer:
      # the v1.1 setup.exe is a 7-Zip Self-extracting archive that requires
      # UAC elevation even with silent flags, and silent install fails on
      # GitHub-hosted runners. The portable ZIP ships the runtime,
      # Compiler/Ahk2Exe.exe, and the base .bin files — everything we need.
      # Extracting to .ahk/ also lets build.ps1's local-fallback find it.
      #
      # Source URL: GitHub Releases, NOT autohotkey.com. The autohotkey.com
      # domain is fronted by Cloudflare with bot-challenge enabled, which
      # blocks GitHub Actions runner IPs (Invoke-WebRequest receives the
      # "Just a moment..." JS challenge HTML instead of the ZIP). The
      # AutoHotkey project mirrors the same release on GitHub Releases —
      # bit-identical artifact, no Cloudflare in front. Keep this URL.
      - name: Install AutoHotkey 1.1.37.02 (portable)
        shell: pwsh
        run: |
          $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          $zip = Join-Path $env:RUNNER_TEMP "ahk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath ".ahk" -Force
          if (-not (Test-Path ".ahk\Compiler\Ahk2Exe.exe")) {
            throw "Ahk2Exe missing at .ahk\Compiler\Ahk2Exe.exe after extract"
          }
          Write-Host "Ahk2Exe ready"

      # Ahk2Exe.exe is a GUI-subsystem app: invoking it with PowerShell's `&`
      # returns immediately without populating $LASTEXITCODE, so the exit-code
      # check fires before compilation finishes. Use Start-Process -Wait
      # -PassThru (same pattern as build.ps1) to block until it really exits.
      - name: Syntax check (compile AHK script)
        shell: pwsh
        run: |
          $compiler = ".ahk\Compiler\Ahk2Exe.exe"
          $base     = ".ahk\Compiler\Unicode 64-bit.bin"
          $tmpExe   = Join-Path $env:RUNNER_TEMP "syntax-check.exe"
          $compilerArgs = "/in pip-controller.ahk /out `"$tmpExe`" /base `"$base`""
          $proc = Start-Process -FilePath $compiler -ArgumentList $compilerArgs -Wait -NoNewWindow -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "Ahk2Exe exited $($proc.ExitCode)"
          }
          if (-not (Test-Path $tmpExe)) {
            throw "Ahk2Exe produced no output"
          }
          Write-Host "OK: built $tmpExe ($((Get-Item $tmpExe).Length) bytes)"

      # PSScriptAnalyzer ships preinstalled on the windows-2025 runner image,
      # but PSGallery occasionally 404s on Install-Module — so prefer the
      # preinstalled copy and only fall back to PSGallery (with retry) when
      # the module isn't already available.
      - name: PSScriptAnalyzer on build.ps1
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "PSScriptAnalyzer not preinstalled — pulling from PSGallery."
            if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            $attempt = 0
            while ($true) {
              $attempt++
              try {
                Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck -ErrorAction Stop
                break
              } catch {
                if ($attempt -ge 3) { throw }
                Write-Host "Install-Module attempt $attempt failed: $($_.Exception.Message). Retrying in 5s..."
                Start-Sleep -Seconds 5
              }
            }
          } else {
            Write-Host "Using preinstalled PSScriptAnalyzer ($((Get-Module -ListAvailable -Name PSScriptAnalyzer | Select-Object -First 1).Version))."
          }
          Import-Module PSScriptAnalyzer
          $results = Invoke-ScriptAnalyzer -Path build.ps1 -Severity Information,Warning,Error
          if ($results) { $results | Format-Table -AutoSize | Out-String | Write-Host }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer: $($errors.Count) error(s)"
          }
          Write-Host "PSScriptAnalyzer: clean (errors)"

      - name: Version consistency
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $match = Select-String -Path pip-controller.ahk -Pattern '^AppVersion := "([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            throw "Could not locate AppVersion line in pip-controller.ahk"
          }
          $inSource = $match.Matches[0].Groups[1].Value
          if ($version -ne $inSource) {
            throw "VERSION ($version) does not match AppVersion in pip-controller.ahk ($inSource)"
          }
          Write-Host "Version check OK: $version"

      # CI builds the portable zip only — installing Inno Setup would add ~30s
      # to every PR for no extra coverage. The full -BuildAll is exercised by
      # the release workflow on tag push.
      - name: Build (smoke, portable only)
        shell: pwsh
        run: |
          ./build.ps1 -BuildPortable
          Get-ChildItem dist | Format-Table -AutoSize

      # Startup smoke test: a compiled AHK script can be syntactically valid
      # but blow up at runtime (missing global, bad COM call, settings parse).
      # Launch the exe and verify it survives 5 seconds without crashing.
      # No tray icon to interact with on a headless runner — just process liveness.
      - name: Smoke test (app starts and stays running)
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath pip-controller.exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            throw "App exited within 5 seconds (exit code $($proc.ExitCode)) — startup crashed."
          }
          Write-Host "PID $($proc.Id) survived 5s — startup OK"
          Stop-Process -Id $proc.Id -Force
          Start-Sleep -Seconds 1
          Write-Host "App stopped cleanly."

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pip-controller-build
          path: |
            pip-controller.exe
            dist/*.zip
          if-no-files-found: warn
          retention-days: 14
