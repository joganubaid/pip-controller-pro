name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v2.2.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write   # required for softprops/action-gh-release to create / update the release
  id-token: write   # required for cosign keyless signing via the GitHub OIDC issuer

jobs:
  release:
    name: Build and publish
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      # SHA-pinned actions; comment lists the human-readable tag so Dependabot
      # can keep the pins current without us losing supply-chain integrity.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if (-not $tag) { $tag = "${{ github.ref_name }}" }
          $version = $tag.TrimStart('v')
          "tag=$tag"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "tag=$tag version=$version"

      - name: Verify VERSION matches tag
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          $expected = "${{ steps.tag.outputs.version }}"
          if ($version -ne $expected) {
            throw "VERSION file ($version) does not match tag ($expected). Bump VERSION before tagging."
          }

      # AHK 1.1 portable ZIP — the v1.1 installer is a 7-Zip SFX that requires
      # UAC and fails silently on hosted runners. URL is GitHub Releases (not
      # autohotkey.com — that domain is Cloudflare-blocked on Actions IPs).
      # See ci.yml for full rationale.
      - name: Install AutoHotkey 1.1.37.02 (portable)
        shell: pwsh
        run: |
          $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip"
          $zip = Join-Path $env:RUNNER_TEMP "ahk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath ".ahk" -Force
          if (-not (Test-Path ".ahk\Compiler\Ahk2Exe.exe")) {
            throw "Ahk2Exe missing after extract"
          }

      # Inno Setup direct download from GitHub Releases (jrsoftware/issrc).
      # NOT files.jrsoftware.org — they rotate older patch versions out and
      # the URL 404s within months (run 26592519186 failed on this). The
      # GitHub Releases mirror keeps every tag forever. 6.7.3 is the latest
      # stable in the 6.x line; same major version means same install path
      # (Inno Setup 6\ISCC.exe) and same silent-install flag support.
      - name: Install Inno Setup 6.7.3
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          $installer = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC missing after install (expected $iscc)"
          }

      - name: Build all artifacts
        shell: pwsh
        run: |
          ./build.ps1 -BuildAll
          Get-ChildItem dist | Format-Table -AutoSize

      # Generate SHA256 checksums for every release artifact so users can
      # verify download integrity without needing cosign / a cert chain.
      # This is the lightweight integrity layer; the Sigstore signatures
      # below are the cryptographic provenance layer on top.
      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $files = @(
            "pip-controller.exe",
            "dist/PiPControllerPro-v$version-Portable.zip",
            "dist/PiPControllerPro-v$version-Setup.exe"
          )
          $lines = foreach ($f in $files) {
            $h = (Get-FileHash -Path $f -Algorithm SHA256).Hash.ToLower()
            "$h  $(Split-Path $f -Leaf)"
          }
          $lines | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          Write-Host "--- SHA256SUMS.txt ---"
          Get-Content dist/SHA256SUMS.txt

      # Free Authenticode-equivalent path: Sigstore keyless signing via the
      # GitHub OIDC token. Doesn't remove Windows SmartScreen warnings (only
      # real Authenticode does that), but it produces a transparency-logged,
      # cryptographically verifiable provenance record tying every artifact
      # to this exact workflow run on this exact repo. See SIGNING.md for
      # the user-facing verification command.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign artifacts with cosign (keyless)
        shell: pwsh
        env:
          COSIGN_YES: "true"
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $files = @(
            "pip-controller.exe",
            "dist/PiPControllerPro-v$version-Portable.zip",
            "dist/PiPControllerPro-v$version-Setup.exe",
            "dist/SHA256SUMS.txt"
          )
          foreach ($f in $files) {
            Write-Host "Signing $f ..."
            cosign sign-blob --yes --bundle "$f.sigstore" $f
            if ($LASTEXITCODE -ne 0) { throw "cosign sign-blob failed for $f" }
          }
          Write-Host "Signatures written:"
          Get-ChildItem -Path . -Filter "*.sigstore" -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.version }}"
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=^## \[|\Z)"
          $m = [regex]::Match($content, $pattern)
          if (-not $m.Success) {
            Write-Host "::warning::No CHANGELOG section for $version; release body will be empty"
            $body = ""
          } else {
            $body = $m.Groups[1].Value.Trim()
          }
          $delim = "EOF_NOTES_$([guid]::NewGuid())"
          "body<<$delim"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $body           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $delim          | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # action-gh-release is SHA-pinned (v3.0.0). Dependabot keeps this current.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "PiP Controller Pro ${{ steps.tag.outputs.tag }}"
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true
          files: |
            pip-controller.exe
            pip-controller.exe.sigstore
            dist/PiPControllerPro-v${{ steps.tag.outputs.version }}-Portable.zip
            dist/PiPControllerPro-v${{ steps.tag.outputs.version }}-Portable.zip.sigstore
            dist/PiPControllerPro-v${{ steps.tag.outputs.version }}-Setup.exe
            dist/PiPControllerPro-v${{ steps.tag.outputs.version }}-Setup.exe.sigstore
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.sigstore
